version: '3.8'

services:
  sharelatex:
    build:
      context: .
      dockerfile: Dockerfile
    image: my-sharelatex:latest
    container_name: sharelatex
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    ports:
      - "${SHARELATEX_PORT:-80}:80"
    environment:
      SHARELATEX_APP_NAME: "${SHARELATEX_APP_NAME:-My ShareLaTeX}"
      SHARELATEX_MONGO_URL: mongodb://mongo/sharelatex
      SHARELATEX_REDIS_HOST: redis
      REDIS_HOST: redis
      SHARELATEX_SITE_URL: "${SHARELATEX_SITE_URL:-http://localhost}"
      SHARELATEX_NAV_TITLE: "${SHARELATEX_APP_NAME:-My ShareLaTeX}"
      SHARELATEX_ADMIN_EMAIL: "${SHARELATEX_ADMIN_EMAIL:-admin@example.com}"
      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"
      ENABLE_CONVERSIONS: "true"
      EMAIL_CONFIRMATION_DISABLED: "true"
      TZ: "${TZ:-Europe/Madrid}"
    volumes:
      - sharelatex_data:/var/lib/sharelatex
    networks:
      - sharelatex_net

  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - sharelatex_net

  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - sharelatex_net

volumes:
  sharelatex_data:
  mongo_data:
  redis_data:

networks:
  sharelatex_net:
